<div class="login-container">
    <div
        class="login-card
            animate__animated
            animate__fadeInUp
            animate__faster">
        <!-- Logo -->
        <div class="logo animate__animated animate__zoomIn">
        <div class="icon animate__animated animate__bounceIn">🏢</div>
        </div>

        <h1 class="animate__animated animate__fadeIn animate__delay-1s">
        Recuperar Contraseña
        </h1>

        <p class="subtitle animate__animated animate__fadeIn animate__delay-1s">
        Ingresa tu correo y nueva contraseña
        </p>

        <form
        class="animate__animated animate__fadeIn animate__delay-2s">

        <label>Correo Electrónico</label>
        <div class="input-group animate__animated animate__fadeInLeft">
            <span class="icon-input">📧</span>
            <input type="email" placeholder="tu@correo.com">
        </div>

        <label>Nueva Contraseña</label>
        <div class="input-group animate__animated animate__fadeInRight">
            <span class="icon-input">🔒</span>
            <input type="password" placeholder="••••••••">
        </div>

        <button
            type="submit"
            class="animate__animated animate__pulse animate__slow">
            🔧 Guardar
        </button>
        </form>

        <p class="back animate__animated animate__fadeIn animate__delay-3s">
        <a routerLink="/login">← Volver al inicio de sesión</a>
        </p>

    </div>
</div>
